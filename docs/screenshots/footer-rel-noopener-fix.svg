  <text x="28" y="70" font-family="Arial, sans-serif" font-size="17" fill="#374151">All target=&quot;_blank&quot; links now include rel=&quot;noopener noreferrer&quot;.</text>

  <rect x="28" y="96" width="1144" height="180" rx="8" fill="#f9fafb" stroke="#d1d5db"/>

